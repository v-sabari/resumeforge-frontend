<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO (per-page overrides handled by useSeoMeta hook) -->
    <title>ResumeForge AI – Build ATS-Ready Resumes in Minutes</title>
    <meta name="description" content="ResumeForge AI helps you build professional, ATS-optimized resumes with AI assistance. Free to start. Export PDF in minutes." />
    <meta name="keywords" content="resume builder, AI resume, ATS resume, free resume maker, CV builder, professional resume, job application, resume tips" />
    <meta name="author" content="ResumeForge AI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://resumeforge.ai" />

    <!-- Open Graph -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://resumeforge.ai" />
    <meta property="og:title"        content="ResumeForge AI – Build ATS-Ready Resumes in Minutes" />
    <meta property="og:description"  content="AI-powered resume builder. Create professional, ATS-optimized resumes in minutes with smart templates and AI writing assistance." />
    <!--
      ACTION REQUIRED ▶ Create og-image.png (1200×630 px) and place in /public/
      Show logo + tagline on brand-colour background. Keep under 200 KB.
      Tools: Canva (free), Figma, or any image editor.
    -->
    <meta property="og:image"        content="https://resumeforge.ai/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"    content="ResumeForge AI" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ResumeForge AI – Build ATS-Ready Resumes in Minutes" />
    <meta name="twitter:description" content="AI-powered resume builder. Create professional, ATS-optimized resumes in minutes." />
    <meta name="twitter:image"       content="https://resumeforge.ai/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!--
      RECOMMENDED ▶ Also add /public/favicon.ico (32×32) and /public/apple-touch-icon.png (180×180)
      for iOS home screen and older browser support.
    -->

    <!-- Font preconnects — must come BEFORE stylesheet links -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts — display=swap prevents render-blocking -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=sora@300,400,500,600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Google Search Console verification -->
    <!--
      ACTION REQUIRED ▶ Go to Search Console → Settings → Ownership verification → HTML tag
      Paste your token below and uncomment.

    <!-- <meta name="google-site-verification" content="PASTE_YOUR_TOKEN_HERE" /> -->

    <!-- Structured Data: WebApplication schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ResumeForge AI",
      "url": "https://resumeforge.ai",
      "description": "AI-powered resume builder for professionals. Create ATS-ready resumes in minutes.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Any",
      "offers": [
        {
          "@type": "Offer",

        }
      ]
