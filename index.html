<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      F1 FIX: vite-ssg injects per-route <title>, <meta name="description">,
      <link rel="canonical">, og:* and twitter:* tags into this shell at build
      time for each pre-rendered route. The placeholders below are defaults
      shown only if a route is NOT pre-rendered (e.g. /app/dashboard).
    -->
    <title>ResumeForge AI – Build ATS-Ready Resumes in Minutes</title>
    <meta name="description" content="ResumeForge AI helps you build professional, ATS-optimized resumes with AI assistance. Free to start. Export PDF in minutes." />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="ResumeForge AI" />
    <meta property="og:title"       content="ResumeForge AI – Build ATS-Ready Resumes in Minutes" />
    <meta property="og:description" content="ResumeForge AI helps you build professional, ATS-optimized resumes with AI assistance." />
    <meta property="og:image"       content="https://www.resumeforgeai.site/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ResumeForge AI – Build ATS-Ready Resumes in Minutes" />
    <meta name="twitter:description" content="ResumeForge AI helps you build professional, ATS-optimized resumes with AI assistance." />
    <meta name="twitter:image"       content="https://www.resumeforgeai.site/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
